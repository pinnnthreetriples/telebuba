version: 2
updates:
  # Keep GitHub Actions pinned versions current. Catches the Node-20 → Node-24
  # deprecation that CI annotations have been warning about, and similar.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    # Supply-chain cooldown: let new releases age 7 days before Dependabot
    # proposes them, so compromised/broken versions get caught upstream first.
    cooldown:
      default-days: 7
    groups:
      actions:
        patterns:
          - "*"

  # Auto-update Telethon (our core Telegram SDK). The "pip" ecosystem is uv-aware
  # and reads uv.lock; scoped to telethon only via `allow` so we don't get PR
  # spam for the whole Python tree, and don't fight the manual CVE pins in
  # pyproject's [tool.uv] override-dependencies.
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7
    allow:
      - dependency-name: "telethon"
