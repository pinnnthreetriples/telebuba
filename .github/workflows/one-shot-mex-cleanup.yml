name: One-shot MEX reference cleanup

on:
  push:
    branches: [ci/mex-memory-gate]
    paths:
      - '.github/workflows/one-shot-mex-cleanup.yml'

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ci/mex-memory-gate
          fetch-depth: 0

      - name: Replace stale reference and remove this workflow
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('schemas/warming.py')
          text = path.read_text(encoding='utf-8')
          old = '# ``WarmingPhase``. See the 2026-07-01 ADR in ``.mex/context/decisions.md``.'
          new = '# ``WarmingPhase``. Current contract: ``.mex/context/runtime.md`` and ``services.warming.pacing``.'
          if text.count(old) != 1:
              raise SystemExit(f'expected exactly one stale reference, found {text.count(old)}')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
          rm .github/workflows/one-shot-mex-cleanup.yml

      - name: Commit cleanup
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add schemas/warming.py .github/workflows/one-shot-mex-cleanup.yml
          git commit -m 'docs: remove stale MEX decision reference'
          git push origin HEAD:ci/mex-memory-gate
