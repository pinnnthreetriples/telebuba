name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.13"
  UV_VERSION: "0.10.9"

jobs:
  # ---------------------------------------------------------------------------
  # Lint + format + types + secrets + bandit, all via the same pre-commit
  # config developers run locally. One source of truth, no drift.
  # ---------------------------------------------------------------------------
  lint:
    name: Lint, format, types, secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # gitleaks needs history to scan the full diff on push
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: ${{ env.UV_VERSION }}
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Run pre-commit (all hooks)
        run: uv run pre-commit run --all-files --show-diff-on-failure

  # ---------------------------------------------------------------------------
  # Tests under the strict config from pyproject.toml:
  #   warnings → errors, asyncio strict, xfail strict, branch cov ≥ 90 %.
  # ---------------------------------------------------------------------------
  test:
    name: pytest (strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: ${{ env.UV_VERSION }}
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Run pytest
        run: uv run pytest

      - name: Upload coverage HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: htmlcov/
          retention-days: 14
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Dependency CVE scan. Runs on every PR and push.
  # ---------------------------------------------------------------------------
  audit:
    name: pip-audit (CVE)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: ${{ env.UV_VERSION }}
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Run pip-audit
        run: uv run pip-audit --strict

  # ---------------------------------------------------------------------------
  # Heavier SAST scan. Only on push to main — too slow for every PR.
  # ---------------------------------------------------------------------------
  semgrep:
    name: semgrep (SAST)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: ${{ env.UV_VERSION }}
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Run semgrep
        run: uv run semgrep --config auto --error .
