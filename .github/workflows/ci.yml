name: CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '.mex/**'
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
  push:
    branches: [main]
    paths-ignore:
      - '.mex/**'
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Supply-chain hardening: drop default write scopes; every job opts in to what
# it actually needs. None of the jobs below post comments or push code, so
# read-all is sufficient.
permissions: read-all

env:
  PYTHON_VERSION: "3.13"
  UV_VERSION: "0.10.9"
  AISLOP_NPM_PACKAGE: "aislop@0.10.2"

jobs:
  # ---------------------------------------------------------------------------
  # Lint + format + types + secrets + bandit, all via the same pre-commit
  # config developers run locally. One source of truth, no drift.
  # ---------------------------------------------------------------------------
  lint:
    name: Lint, format, types, secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # gitleaks needs history to scan the full diff on push
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true

      - name: Cache pre-commit envs
        uses: actions/cache@v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Run pre-commit (all hooks)
        run: uv run pre-commit run --all-files --show-diff-on-failure

  # ---------------------------------------------------------------------------
  # Tests under the strict config from pyproject.toml.
  # Hypothesis profile depends on the trigger:
  #   PR / workflow_dispatch → dev (50 examples, fast feedback)
  #   push to main           → strict (200 examples)
  # The nightly workflow runs the extended profile separately.
  # ---------------------------------------------------------------------------
  test:
    name: pytest (strict)
    runs-on: ubuntu-latest
    env:
      HYPOTHESIS_PROFILE: ${{ github.event_name == 'pull_request' && 'dev' || 'strict' }}
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Run pytest
        # --maxfail caps log noise when a single bad import cascades into
        # many warning-as-error failures. Diagnostic info is preserved.
        run: uv run pytest --maxfail=10

      - name: Upload coverage HTML report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-html
          path: htmlcov/
          retention-days: 14
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Dependency CVE scan. Runs on every PR and push.
  # ---------------------------------------------------------------------------
  audit:
    name: pip-audit (CVE)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Run pip-audit
        run: uv run pip-audit --strict

  # ---------------------------------------------------------------------------
  # SAST scan on every PR and push, so the security gate fires before merge
  # (not after). The heavier full rulesets run in the nightly workflow.
  # ---------------------------------------------------------------------------
  semgrep:
    name: semgrep (SAST, auto)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Run semgrep
        run: uv run semgrep --config auto --error .

  # ---------------------------------------------------------------------------
  # aislop — AI-slop quality gate, zero-tolerance (any error OR warning fails).
  # It is an npm tool, so the runner needs Node; the gate is a thin JSON-parsing
  # wrapper (tools/aislop_gate.py). Runs on every PR and push.
  # ---------------------------------------------------------------------------
  aislop:
    name: aislop (quality gate, zero-tolerance)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Run aislop gate
        run: uv run python tools/aislop_gate.py
