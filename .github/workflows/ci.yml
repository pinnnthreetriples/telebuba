name: CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '.mex/**'
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
  push:
    branches: [main]
    paths-ignore:
      - '.mex/**'
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Supply-chain hardening: drop default write scopes; every job opts in to what
# it actually needs. None of the jobs below post comments or push code, so
# read-all is sufficient.
permissions: read-all

env:
  PYTHON_VERSION: "3.13.14"
  UV_VERSION: "0.10.9"
  AISLOP_NPM_PACKAGE: "aislop@0.10.2"
  # Node 24: steiger's web-tree-sitter (WASM) throws "bad export type for 'deleter'"
  # on Node 20. 24 is the dev target and runs the whole FE toolchain cleanly.
  NODE_VERSION: "24"

jobs:
  # ---------------------------------------------------------------------------
  # Lint + format + types + secrets + bandit, all via the same pre-commit
  # config developers run locally. One source of truth, no drift.
  # ---------------------------------------------------------------------------
  lint:
    name: Lint, format, types, secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # gitleaks needs history to scan the full diff on push
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          version: ${{ env.UV_VERSION }}
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true

      - name: Cache pre-commit envs
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Run pre-commit (all hooks)
        run: uv run pre-commit run --all-files --show-diff-on-failure

  # ---------------------------------------------------------------------------
  # Tests under the strict config from pyproject.toml.
  # Hypothesis profile depends on the trigger:
  #   PR / workflow_dispatch → dev (50 examples, fast feedback)
  #   push to main           → strict (200 examples)
  # The nightly workflow runs the extended profile separately.
  # ---------------------------------------------------------------------------
  test:
    name: pytest (strict)
    runs-on: ubuntu-latest
    env:
      HYPOTHESIS_PROFILE: ${{ github.event_name == 'pull_request' && 'dev' || 'strict' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          version: ${{ env.UV_VERSION }}
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Run pytest
        # --maxfail caps log noise when a single bad import cascades into
        # many warning-as-error failures. Diagnostic info is preserved.
        run: uv run pytest --maxfail=10

      - name: Upload coverage HTML report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-html
          path: htmlcov/
          retention-days: 14
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Dependency CVE scan. Runs on every PR and push.
  # ---------------------------------------------------------------------------
  audit:
    name: pip-audit (CVE)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          version: ${{ env.UV_VERSION }}
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Run pip-audit
        # PYSEC-2026-2132 (click < 8.3.3) is unfixable here: semgrep pins
        # ``click~=8.1.8`` (< 8.2), so click cannot be bumped while semgrep is a
        # dev dependency. click is dev-tooling / uvicorn-CLI only, not a runtime
        # request path. Drop this ignore once semgrep loosens its click pin.
        run: uv run pip-audit --strict --ignore-vuln PYSEC-2026-2132

  # ---------------------------------------------------------------------------
  # SAST scan on every PR and push, so the security gate fires before merge
  # (not after). The heavier full rulesets run in the nightly workflow.
  # ---------------------------------------------------------------------------
  semgrep:
    name: semgrep (SAST, auto)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          version: ${{ env.UV_VERSION }}
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Run semgrep
        # No --exclude-rule list: the CI-hardening advisories it used to mute
        # (dependabot/uv cooldowns + mutable action tags) are fixed at the source —
        # actions pinned to SHAs, cooldowns configured in dependabot.yml/pyproject.
        run: uv run semgrep --config auto --error .

  # ---------------------------------------------------------------------------
  # aislop — AI-slop quality gate, zero-tolerance (any error OR warning fails).
  # It is an npm tool, so the runner needs Node; the gate is a thin JSON-parsing
  # wrapper (tools/aislop_gate.py). Runs on every PR and push.
  # ---------------------------------------------------------------------------
  aislop:
    name: aislop (quality gate, zero-tolerance)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          version: ${{ env.UV_VERSION }}
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Run aislop gate
        run: uv run python tools/aislop_gate.py

  # ---------------------------------------------------------------------------
  # gen-api drift — regenerate the typed frontend client from the live OpenAPI
  # schema and fail if it differs from what is committed. This is the hard
  # anti-drift gate: pydantic -> FastAPI OpenAPI -> hey-api client must stay
  # in sync. Pinned generator versions (frontend/package-lock.json + npm ci)
  # make the output reproducible across machines.
  # ---------------------------------------------------------------------------
  gen-api:
    name: gen-api (client drift)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          version: ${{ env.UV_VERSION }}
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: Regenerate the API client
        run: uv run python -m tools.gen_api

      - name: Fail on client drift
        run: git diff --exit-code frontend/src/shared/api frontend/openapi.json

  # ---------------------------------------------------------------------------
  # frontend — the React SPA's own gate set (per the FSD ADR): Steiger boundary
  # lint + ESLint + Prettier + tsc --strict + Vitest (80% floor), then a
  # production build. Independent of the Python jobs.
  # ---------------------------------------------------------------------------
  frontend:
    name: frontend (lint/boundaries/tsc/vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: npm ci

      - name: Gates (boundaries + eslint + prettier + tsc + vitest)
        run: npm run gates

      - name: Build
        run: npm run build
