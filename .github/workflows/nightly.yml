name: Nightly

# Heavier checks that do not gate PR merges. They produce signal but the
# wallclock cost is not worth paying on every push.

on:
  schedule:
    - cron: "0 3 * * *"  # 03:00 UTC daily
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

# Supply-chain hardening: drop default write scopes.
permissions: read-all

env:
  PYTHON_VERSION: "3.13"
  UV_VERSION: "0.10.9"

jobs:
  # ---------------------------------------------------------------------------
  # Hypothesis extended profile — 2000 examples per property, higher chance of
  # surfacing rare path-dependent bugs that the 200-example strict run misses.
  # ---------------------------------------------------------------------------
  extended-hypothesis:
    name: pytest (Hypothesis extended)
    runs-on: ubuntu-latest
    env:
      HYPOTHESIS_PROFILE: extended
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Run pytest (extended)
        run: uv run pytest

  # ---------------------------------------------------------------------------
  # Full semgrep rulesets — security-audit + OWASP top 10 + python-strict.
  # Slow; meant to catch issues that the auto config skips.
  # ---------------------------------------------------------------------------
  semgrep-full:
    name: semgrep (full rulesets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Run semgrep
        run: |
          uv run semgrep \
            --config p/security-audit \
            --config p/owasp-top-ten \
            --config p/python \
            --error \
            .
