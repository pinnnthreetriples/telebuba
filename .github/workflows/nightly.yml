name: Nightly

# Heavier checks that do not gate PR merges. They produce signal but the
# wallclock cost is not worth paying on every push.

on:
  schedule:
    - cron: "0 3 * * *"  # 03:00 UTC daily
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  # Mutation runs are expensive and form a comparable time series; a manual
  # dispatch must not silently cancel the scheduled run whose report we need.
  cancel-in-progress: false

# Supply-chain hardening: drop default write scopes.
permissions: read-all

env:
  PYTHON_VERSION: "3.13.14"
  UV_VERSION: "0.11.29"

jobs:
  # ---------------------------------------------------------------------------
  # Hypothesis extended profile — 2000 examples per property, higher chance of
  # surfacing rare path-dependent bugs that the 200-example strict run misses.
  # ---------------------------------------------------------------------------
  extended-hypothesis:
    name: pytest (Hypothesis extended)
    runs-on: ubuntu-latest
    env:
      HYPOTHESIS_PROFILE: extended
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: ${{ env.UV_VERSION }}
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Run pytest (extended)
        run: uv run pytest

  # ---------------------------------------------------------------------------
  # Full semgrep rulesets — security-audit + OWASP top 10 + python-strict.
  # Slow; meant to catch issues that the auto config skips.
  # ---------------------------------------------------------------------------
  semgrep-full:
    name: semgrep (full rulesets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: ${{ env.UV_VERSION }}
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Run semgrep
        run: |
          uv run semgrep \
            --config p/security-audit \
            --config p/owasp-top-ten \
            --config p/python \
            --error \
            .

  # ---------------------------------------------------------------------------
  # Mutation testing — verifies tests catch real bugs, not just exercise code.
  # Slow by nature; nightly cadence keeps it off the PR critical path.
  # ---------------------------------------------------------------------------
  mutation:
    name: mutation testing
    runs-on: ubuntu-latest
    env:
      HYPOTHESIS_PROFILE: mutation
      MUTMUT_MAX_CHILDREN: "4"
      PYTHONHASHSEED: "0"
      TZ: UTC
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: ${{ env.UV_VERSION }}
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Free runner disk space
        # The mutant sweep needs more scratch space than the stock ubuntu-latest
        # image leaves free (~14 GB): the 2026-07-05 dispatch run died mid-sweep
        # with "No space left on device" (runner killed, logs lost). Dropping the
        # unused Android SDK and .NET toolchains frees ~20 GB in seconds.
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc
          df -h /

      - name: Run mutmut
        shell: bash
        run: |
          uv run mutmut run --max-children "$MUTMUT_MAX_CHILDREN"

          # Preserve the complete first attempt before any repair. mutmut 3.6
          # resets non-selected statuses during a targeted run, so its raw
          # output is evidence for only the explicitly requested mutants.
          mkdir -p mutation-report/attempt-1
          uv run mutmut results --all true > mutation-report/attempt-1/results-all.txt
          uv run mutmut results > mutation-report/attempt-1/actionable.txt
          uv run mutmut export-cicd-stats
          cp mutants/mutmut-cicd-stats.json mutation-report/attempt-1/stats.json

          uv run python - <<'PY'
          from pathlib import Path

          from tools.mutation_report import load_results

          results = load_results(Path("mutation-report/attempt-1/results-all.txt"))
          incomplete = sorted(
              result.name
              for result in results
              if result.status in {"not checked", "check was interrupted by user"}
          )
          Path("mutation-report/repair-mutants.txt").write_text(
              "".join(f"{name}\n" for name in incomplete),
              encoding="utf-8",
          )
          print(f"First attempt has {len(incomplete)} incomplete mutants")
          PY

          if [[ -s mutation-report/repair-mutants.txt ]]; then
            mapfile -t repair_mutants < mutation-report/repair-mutants.txt
            printf 'Repairing %d incomplete mutants\n' "${#repair_mutants[@]}"
            uv run mutmut run --max-children "$MUTMUT_MAX_CHILDREN" "${repair_mutants[@]}"
            mkdir -p mutation-report/repair
            uv run mutmut results --all true > mutation-report/repair/results-all.txt
            uv run mutmut results > mutation-report/repair/actionable.txt
            uv run mutmut export-cicd-stats
            cp mutants/mutmut-cicd-stats.json mutation-report/repair/stats.json
          fi

      # If the sweep fails again, show where the disk went — the runner dies too
      # hard to upload step logs, so this is the only signal that survives.
      - name: Disk usage diagnostics
        if: failure()
        run: |
          df -h /
          sudo du -h -d 2 /tmp "$GITHUB_WORKSPACE" 2>/dev/null | sort -rh | head -25

      - name: Build mutation report
        if: always()
        shell: bash
        run: |
          mkdir -p mutation-report
          cp mutation-report/attempt-1/results-all.txt mutation-report/results-all.txt
          cp mutation-report/attempt-1/actionable.txt mutation-report/actionable.txt
          cp mutation-report/attempt-1/stats.json mutation-report/stats.json
          repair_args=()
          if [[ -f mutation-report/repair/results-all.txt ]]; then
            repair_args=(--repair-results mutation-report/repair/results-all.txt)
          fi
          uv run python tools/mutation_report.py report \
            --stats mutation-report/stats.json \
            --results mutation-report/results-all.txt \
            "${repair_args[@]}" \
            --hypothesis-profile "$HYPOTHESIS_PROFILE" \
            --max-children "$MUTMUT_MAX_CHILDREN" \
            --python-hash-seed "$PYTHONHASHSEED" \
            --timezone "$TZ" \
            --baseline .github/mutation-baseline.json \
            --project pyproject.toml \
            --output mutation-report/report.json \
            --summary mutation-report/summary.md
          uv run python - <<'PY'
          import importlib.metadata
          import json
          import os
          import platform
          from pathlib import Path

          metadata = {
              "commit_sha": os.environ["GITHUB_SHA"],
              "github_run_attempt": os.environ["GITHUB_RUN_ATTEMPT"],
              "github_run_id": os.environ["GITHUB_RUN_ID"],
              "hypothesis_profile": os.environ["HYPOTHESIS_PROFILE"],
              "max_children": int(os.environ["MUTMUT_MAX_CHILDREN"]),
              "mutmut_version": importlib.metadata.version("mutmut"),
              "python_hash_seed": os.environ["PYTHONHASHSEED"],
              "python_version": platform.python_version(),
              "timezone": os.environ["TZ"],
          }
          Path("mutation-report/metadata.json").write_text(
              json.dumps(metadata, indent=2) + "\n",
              encoding="utf-8",
          )
          PY
          cat mutation-report/summary.md >> "$GITHUB_STEP_SUMMARY"

      # Upload before the gate so a regression still leaves complete evidence.
      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mutation-report-${{ github.run_id }}-${{ github.run_attempt }}
          path: mutation-report/
          if-no-files-found: error
          retention-days: 30

      # Survivors remain actionable signal, not individual CI failures. The gate
      # protects the aggregate score and the reviewed measurement identity.
      - name: Enforce mutation baseline
        shell: bash
        run: |
          repair_args=()
          if [[ -f mutation-report/repair/results-all.txt ]]; then
            repair_args=(--repair-results mutation-report/repair/results-all.txt)
          fi
          uv run python tools/mutation_report.py gate \
            --stats mutation-report/stats.json \
            --results mutation-report/results-all.txt \
            "${repair_args[@]}" \
            --hypothesis-profile "$HYPOTHESIS_PROFILE" \
            --max-children "$MUTMUT_MAX_CHILDREN" \
            --python-hash-seed "$PYTHONHASHSEED" \
            --timezone "$TZ" \
            --baseline .github/mutation-baseline.json \
            --project pyproject.toml
